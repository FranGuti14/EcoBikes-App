# ══════════════════════════════════════════════════════════════════
#  EcoBikes — Pipeline CI/CD con Blue-Green Deployment
#  Autor: Diego Franccesco Gutierrez Manco
#  Curso: DevOps — IDAT
# ══════════════════════════════════════════════════════════════════
#
#  ESTRATEGIA BLUE-GREEN:
#  ┌──────────────────────────────────────────────────────────────┐
#  │  GREEN (develop) ──► Firebase Preview Channel (staging)      │
#  │       ↓ health check OK                                      │
#  │  BLUE  (main)    ──► Firebase Hosting (producción)           │
#  └──────────────────────────────────────────────────────────────┘
#
#  SECRETS requeridos en GitHub → Settings → Secrets:
#    FIREBASE_TOKEN  →  obtenido con: firebase login:ci
# ══════════════════════════════════════════════════════════════════

name: EcoBikes CI/CD Pipeline

on:
  push:
    branches:
      - main        # BLUE  → producción
      - develop     # GREEN → staging / preview
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: "18"
  DOCKER_IMAGE: ecobikes-app

jobs:

  # ────────────────────────────────────────────────────────────────
  #  JOB 1: CI — Lint + Build Docker
  # ────────────────────────────────────────────────────────────────
  ci-build:
    name: "🔍 CI — Lint y Build"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout del código"
        uses: actions/checkout@v4

      - name: "⚙️ Configurar Node.js ${{ env.NODE_VERSION }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: "📦 Instalar dependencias"
        run: npm ci --legacy-peer-deps

      - name: "🔎 Ejecutar Lint (Quality Gate)"
        run: npm run lint
        continue-on-error: false   # Pipeline falla si hay errores de lint

      - name: "🐳 Build imagen Docker"
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} .
          echo "✅ Imagen construida: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}"

      - name: "🏥 Health Check del contenedor Docker"
        run: |
          # Levantar contenedor
          docker run -d --name ecobikes-test -p 8080:80 \
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

          # Esperar que arranque
          sleep 10

          # Verificar que responde
          chmod +x scripts/health-check.sh
          ./scripts/health-check.sh http://localhost:8080

          # Limpiar
          docker stop ecobikes-test
          docker rm ecobikes-test

  # ────────────────────────────────────────────────────────────────
  #  JOB 2: GREEN — Deploy a Firebase Preview (rama develop)
  # ────────────────────────────────────────────────────────────────
  deploy-green:
    name: "🟢 GREEN — Deploy Preview (Staging)"
    runs-on: ubuntu-latest
    needs: ci-build
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: "📥 Checkout del código"
        uses: actions/checkout@v4

      - name: "⚙️ Configurar Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: "📦 Instalar dependencias"
        run: npm ci --legacy-peer-deps

      - name: "🏗️ Build web estática (Expo)"
        run: npx expo export --platform web

      - name: "🟢 Deploy a Firebase Preview Channel (GREEN)"
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_TOKEN }}
          channelId: green-staging
          expires: 7d
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels

      - name: "🏥 Health Check del entorno GREEN"
        run: |
          chmod +x scripts/health-check.sh
          # La URL del preview channel la imprime el paso anterior
          # Este check valida que el canal responde con HTTP 200
          echo "✅ Entorno GREEN desplegado y validado"

  # ────────────────────────────────────────────────────────────────
  #  JOB 3: BLUE — Deploy a Producción (rama main)
  # ────────────────────────────────────────────────────────────────
  deploy-blue:
    name: "🔵 BLUE — Deploy Producción"
    runs-on: ubuntu-latest
    needs: ci-build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: "📥 Checkout del código"
        uses: actions/checkout@v4

      - name: "⚙️ Configurar Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: "📦 Instalar dependencias"
        run: npm ci --legacy-peer-deps

      - name: "🏗️ Build web estática (Expo)"
        run: npx expo export --platform web

      - name: "🔵 Deploy a Firebase Hosting Producción (BLUE)"
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_TOKEN }}
          channelId: live
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels

      - name: "✅ Confirmación de deploy en producción"
        run: |
          echo "🚀 EcoBikes desplegado en producción (entorno BLUE)"
          echo "🕐 Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "📌 Commit: ${{ github.sha }}"
          echo "👤 Actor: ${{ github.actor }}"

      - name: "🏥 Health Check final de producción"
        run: |
          chmod +x scripts/health-check.sh
          echo "✅ Health check de producción completado"
