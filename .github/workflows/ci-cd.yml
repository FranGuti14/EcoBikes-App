# ══════════════════════════════════════════════════════════════════
#  EcoBikes — Pipeline CI/CD con Blue-Green Deployment
#  Autor: Diego Franccesco Gutierrez Manco
#  Curso: DevOps — IDAT
# ══════════════════════════════════════════════════════════════════
#
#  ESTRATEGIA BLUE-GREEN:
#  ┌──────────────────────────────────────────────────────────────┐
#  │  GREEN (develop) ──► Firebase Preview Channel (staging)      │
#  │       ↓ health check OK                                      │
#  │  BLUE  (main)    ──► Firebase Hosting (producción)           │
#  └──────────────────────────────────────────────────────────────┘

name: EcoBikes CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: "20"

jobs:

  # ────────────────────────────────────────────────────────────────
  #  JOB 1: CI — Lint + Build Expo + Build Docker
  # ────────────────────────────────────────────────────────────────
  ci-build:
    name: "🔍 CI — Lint y Build"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout del código"
        uses: actions/checkout@v4

      - name: "⚙️ Configurar Node.js ${{ env.NODE_VERSION }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: "📦 Instalar dependencias"
        run: npm ci --legacy-peer-deps

      - name: "🔎 Ejecutar Lint (Quality Gate)"
        run: npm run lint
        continue-on-error: false

      - name: "🏗️ Build web estática (Expo)"
        run: npx expo export --platform web
        env:
          CI: false
          EXPO_NO_TELEMETRY: 1

      - name: "🐳 Build imagen Docker"
        run: |
          docker build -t ecobikes-app:${{ github.sha }} .
          echo "✅ Imagen construida: ecobikes-app:${{ github.sha }}"

      - name: "🏥 Health Check del contenedor Docker"
        run: |
          docker run -d --name ecobikes-test -p 8080:80 ecobikes-app:${{ github.sha }}
          sleep 8
          chmod +x scripts/health-check.sh
          ./scripts/health-check.sh http://localhost:8080
          docker stop ecobikes-test
          docker rm ecobikes-test

      - name: "📤 Guardar build para deploy"
        uses: actions/upload-artifact@v4
        with:
          name: expo-dist
          path: dist/

  # ────────────────────────────────────────────────────────────────
  #  JOB 2: GREEN — Deploy a Firebase Preview (rama develop)
  # ────────────────────────────────────────────────────────────────
  deploy-green:
    name: "🟢 GREEN — Deploy Preview (Staging)"
    runs-on: ubuntu-latest
    needs: ci-build
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: "📥 Checkout del código"
        uses: actions/checkout@v4

      - name: "📥 Descargar build"
        uses: actions/download-artifact@v4
        with:
          name: expo-dist
          path: dist/

      - name: "🟢 Deploy a Firebase Preview Channel (GREEN)"
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_TOKEN }}
          channelId: green-staging
          expires: 7d

      - name: "✅ Entorno GREEN desplegado"
        run: |
          echo "🟢 EcoBikes desplegado en staging (entorno GREEN)"
          echo "🕐 Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "📌 Commit: ${{ github.sha }}"

  # ────────────────────────────────────────────────────────────────
  #  JOB 3: BLUE — Deploy a Producción (rama main)
  # ────────────────────────────────────────────────────────────────
  deploy-blue:
    name: "🔵 BLUE — Deploy Producción"
    runs-on: ubuntu-latest
    needs: ci-build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: "📥 Checkout del código"
        uses: actions/checkout@v4

      - name: "📥 Descargar build"
        uses: actions/download-artifact@v4
        with:
          name: expo-dist
          path: dist/

      - name: "🔵 Deploy a Firebase Hosting Producción (BLUE)"
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_TOKEN }}
          channelId: live

      - name: "✅ Confirmación de deploy en producción"
        run: |
          echo "🚀 EcoBikes desplegado en producción (entorno BLUE)"
          echo "🕐 Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "📌 Commit: ${{ github.sha }}"
          echo "👤 Actor: ${{ github.actor }}"
